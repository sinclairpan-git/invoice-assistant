name: Windows Offline Smoke

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/windows-offline-smoke.yml"
      - ".github/workflows/posix-offline-smoke.yml"
      - ".github/workflows/release-build.yml"
      - ".github/workflows/release-artifact-smoke.yml"
      - "backend/**"
      - "frontend/**"
      - "packaging/**"
      - "scripts/build_cloud_release_bundle.py"
      - "scripts/build_windows_portable.py"
      - "scripts/prepare_windows_portable_runtime.py"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: windows-offline-smoke-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: windows-latest
    timeout-minutes: 45

    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: utf-8

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up pnpm
        uses: pnpm/action-setup@v5.0.0
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm --dir frontend install --frozen-lockfile

      - name: Build frontend
        run: pnpm --dir frontend build

      - name: Build Windows offline bundle
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          python scripts/prepare_windows_portable_runtime.py --runtime-root ".tmp\windows-runtime\python-3.11.9"
          python scripts/build_windows_portable.py `
            --version "v0.5.2-smoke" `
            --dist-root dist-offline `
            --python-runtime-root ".tmp\windows-runtime\python-3.11.9" `
            --bundle-name "invoice-assistant-offline-v0.5.2-smoke-windows-amd64"

      - name: Install bundle and run runtime smoke
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true

          $archive = Get-ChildItem -Path "dist-offline" -Filter "invoice-assistant-offline-*.zip" -File | Select-Object -First 1
          if (-not $archive) {
            throw "Expected invoice-assistant-offline-*.zip archive was not produced."
          }

          $smokeRoot = Join-Path $env:RUNNER_TEMP "invoice-assistant-windows-smoke"
          $evidenceRoot = Join-Path $env:RUNNER_TEMP "invoice-assistant-windows-smoke-evidence"
          Remove-Item -Recurse -Force $smokeRoot, $evidenceRoot -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $smokeRoot, $evidenceRoot | Out-Null

          Expand-Archive -LiteralPath $archive.FullName -DestinationPath $smokeRoot -Force
          $bundleDir = Get-ChildItem -Path $smokeRoot -Directory | Select-Object -First 1
          if (-not $bundleDir) {
            throw "Expanded archive did not contain a bundle directory."
          }

          if (-not (Test-Path (Join-Path $bundleDir.FullName "manifest.json"))) { throw "Missing manifest.json" }
          if (-not (Test-Path (Join-Path $bundleDir.FullName "启动发票助手.bat"))) { throw "Missing 启动发票助手.bat" }
          if (-not (Test-Path (Join-Path $bundleDir.FullName "停止发票助手.bat"))) { throw "Missing 停止发票助手.bat" }
          if (-not (Test-Path (Join-Path $bundleDir.FullName "app\python\python.exe"))) { throw "Missing bundled Python runtime" }
          if (-not (Test-Path (Join-Path $bundleDir.FullName "app\bootstrap\launch_portable.py"))) { throw "Missing launch_portable.py" }

          Push-Location $bundleDir.FullName
          & .\app\python\python.exe app\bootstrap\launch_portable.py --portable-root $bundleDir.FullName --no-browser --timeout-seconds 45 *>&1 | Tee-Object -FilePath (Join-Path $evidenceRoot "launch.log")
          if ($LASTEXITCODE -ne 0) {
            throw "launch_portable.py failed with exit code $LASTEXITCODE"
          }

          & .\app\python\python.exe -c "import sys; sys.path.insert(0, 'app/server'); import backend.app.main; import fastapi, sqlalchemy, uvicorn" *>&1 | Tee-Object -FilePath (Join-Path $evidenceRoot "import-smoke.txt")
          if ($LASTEXITCODE -ne 0) {
            throw "runtime import smoke failed with exit code $LASTEXITCODE"
          }

          & .\app\python\python.exe app\bootstrap\stop_portable.py --portable-root $bundleDir.FullName *>&1 | Tee-Object -FilePath (Join-Path $evidenceRoot "stop.log")
          if ($LASTEXITCODE -ne 0) {
            throw "stop_portable.py failed with exit code $LASTEXITCODE"
          }
          Pop-Location

          Copy-Item -LiteralPath (Join-Path $bundleDir.FullName "manifest.json") -Destination $evidenceRoot
          Copy-Item -LiteralPath (Join-Path $bundleDir.FullName "logs\startup.log") -Destination $evidenceRoot -ErrorAction SilentlyContinue

      - name: Upload smoke evidence
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: windows-offline-smoke-evidence
          path: ${{ runner.temp }}/invoice-assistant-windows-smoke-evidence
          if-no-files-found: error
