name: Compatibility Gate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PYTHONUTF8: "1"
  PYTHONIOENCODING: utf-8

concurrency:
  group: compatibility-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  cross-platform-validation:
    name: Cross Platform Validation (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        python-version:
          - "3.11"
          - "3.12"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up pnpm
        uses: pnpm/action-setup@v5.0.0
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Run backend compatibility tests
        run: >-
          uv run pytest
          backend/tests/test_app_boot.py
          backend/tests/test_release_runtime.py
          backend/tests/test_portable_bootstrap.py
          backend/tests/test_cloud_release_bundle.py
          -q

      - name: Install frontend dependencies
        run: pnpm --dir frontend install --frozen-lockfile

      - name: Build frontend
        run: pnpm --dir frontend build

  windows-shell-smoke:
    name: Windows Shell Smoke (${{ matrix.shell }})
    runs-on: windows-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        shell:
          - pwsh
          - cmd

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install backend runtime dependencies
        run: python -m pip install -e backend

      - name: Shell smoke (pwsh)
        if: matrix.shell == 'pwsh'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          python -c "import backend.app.main; import fastapi, sqlalchemy, uvicorn"

      - name: Shell smoke (cmd)
        if: matrix.shell == 'cmd'
        shell: cmd
        run: |
          python -c "import backend.app.main; import fastapi, sqlalchemy, uvicorn" || exit /b 1

  offline-bundle-smoke:
    name: Offline Bundle Smoke (${{ matrix.asset_os }} ${{ matrix.archive }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        include:
          - asset_os: windows
            runner: windows-latest
            archive: zip
          - asset_os: macos
            runner: macos-latest
            archive: tar.gz

    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: utf-8

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up pnpm
        uses: pnpm/action-setup@v5.0.0
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm --dir frontend install --frozen-lockfile

      - name: Build frontend
        run: pnpm --dir frontend build

      - name: Build backend runtime wheelhouse
        if: matrix.asset_os == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist-offline/wheels
          python - <<'PY'
          import tomllib
          from pathlib import Path
          deps = tomllib.loads(Path("backend/pyproject.toml").read_text(encoding="utf-8"))["project"]["dependencies"]
          Path("dist-offline/backend-runtime-requirements.txt").write_text("\n".join(deps) + "\n", encoding="utf-8")
          PY
          python -m pip install --upgrade pip
          python -m pip download --only-binary=:all: --dest dist-offline/wheels -r dist-offline/backend-runtime-requirements.txt

      - name: Build Windows offline bundle
        if: matrix.asset_os == 'windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          python scripts/prepare_windows_portable_runtime.py --runtime-root ".tmp\windows-runtime\python-3.11.9"
          python scripts/build_windows_portable.py `
            --version "v0.5.2-pr-smoke" `
            --dist-root dist-offline `
            --python-runtime-root ".tmp\windows-runtime\python-3.11.9" `
            --bundle-name "invoice-assistant-offline-v0.5.2-pr-smoke-windows-amd64"

      - name: Build macOS offline bundle
        if: matrix.asset_os == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          machine="$(uname -m | tr '[:upper:]' '[:lower:]')"
          case "${machine}" in
            x86_64|amd64) machine="amd64" ;;
            arm64|aarch64) machine="arm64" ;;
          esac
          python scripts/build_cloud_release_bundle.py \
            --version "v0.5.2-pr-smoke" \
            --platform-os macos \
            --platform-machine "${machine}" \
            --archive-format tar.gz \
            --wheels-dir dist-offline/wheels

      - name: Smoke Windows zip
        if: matrix.asset_os == 'windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $asset = Get-ChildItem -Path "dist-offline" -Filter "invoice-assistant-offline-*.zip" -File | Select-Object -First 1
          if (-not $asset) { throw "Expected invoice-assistant-offline-*.zip was not produced." }
          $smokeRoot = Join-Path $env:RUNNER_TEMP "invoice-assistant-compat-smoke"
          $evidenceRoot = Join-Path $env:RUNNER_TEMP "invoice-assistant-compat-evidence"
          Remove-Item -Recurse -Force $smokeRoot, $evidenceRoot -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $smokeRoot, $evidenceRoot | Out-Null
          Expand-Archive -LiteralPath $asset.FullName -DestinationPath $smokeRoot -Force
          $bundleDir = Get-ChildItem -Path $smokeRoot -Directory | Select-Object -First 1
          if (-not $bundleDir) { throw "Expanded archive did not contain a bundle directory." }
          if (-not (Test-Path (Join-Path $bundleDir.FullName "manifest.json"))) { throw "Missing manifest.json" }
          if (-not (Test-Path (Join-Path $bundleDir.FullName "启动发票助手.bat"))) { throw "Missing 启动发票助手.bat" }
          if (-not (Test-Path (Join-Path $bundleDir.FullName "停止发票助手.bat"))) { throw "Missing 停止发票助手.bat" }
          if (-not (Test-Path (Join-Path $bundleDir.FullName "用户指引.html"))) { throw "Missing 用户指引.html" }
          if (-not (Test-Path (Join-Path $bundleDir.FullName "app\python\python.exe"))) { throw "Missing bundled Python runtime" }
          if (-not (Test-Path (Join-Path $bundleDir.FullName "app\bootstrap\launch_portable.py"))) { throw "Missing launch_portable.py" }
          Push-Location $bundleDir.FullName
          & .\app\python\python.exe app\bootstrap\launch_portable.py --portable-root $bundleDir.FullName --no-browser --timeout-seconds 45 *>&1 | Tee-Object -FilePath (Join-Path $evidenceRoot "launch.log")
          if ($LASTEXITCODE -ne 0) { throw "launch_portable.py failed with exit code $LASTEXITCODE" }
          & .\app\python\python.exe -c "import sys; sys.path.insert(0, 'app/server'); import backend.app.main; import fastapi, sqlalchemy, uvicorn" *>&1 | Tee-Object -FilePath (Join-Path $evidenceRoot "import-smoke.txt")
          if ($LASTEXITCODE -ne 0) { throw "runtime import smoke failed with exit code $LASTEXITCODE" }
          & .\app\python\python.exe app\bootstrap\stop_portable.py --portable-root $bundleDir.FullName *>&1 | Tee-Object -FilePath (Join-Path $evidenceRoot "stop.log")
          if ($LASTEXITCODE -ne 0) { throw "stop_portable.py failed with exit code $LASTEXITCODE" }
          Pop-Location
          Copy-Item -LiteralPath (Join-Path $bundleDir.FullName "manifest.json") -Destination $evidenceRoot
          Copy-Item -LiteralPath (Join-Path $bundleDir.FullName "logs\startup.log") -Destination $evidenceRoot -ErrorAction SilentlyContinue

      - name: Smoke macOS tar
        if: matrix.asset_os == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          archive="$(find dist-offline -maxdepth 1 -name 'invoice-assistant-offline-*.tar.gz' -type f | head -n 1)"
          if [[ -z "${archive}" ]]; then
            echo "Expected invoice-assistant-offline-*.tar.gz was not produced." >&2
            exit 1
          fi
          smoke_root="${RUNNER_TEMP}/invoice-assistant-compat-smoke"
          evidence_root="${RUNNER_TEMP}/invoice-assistant-compat-evidence"
          rm -rf "${smoke_root}" "${evidence_root}"
          mkdir -p "${smoke_root}" "${evidence_root}"
          tar xzf "${archive}" -C "${smoke_root}"
          bundle_dir="$(find "${smoke_root}" -mindepth 1 -maxdepth 1 -type d | head -n 1)"
          test -n "${bundle_dir}"
          test -f "${bundle_dir}/bundle-manifest.json"
          test -x "${bundle_dir}/install_offline.sh"
          test -x "${bundle_dir}/启动发票助手.command"
          test -x "${bundle_dir}/停止发票助手.command"
          test -f "${bundle_dir}/用户指引.html"
          (
            cd "${bundle_dir}"
            ./install_offline.sh 2>&1 | tee "${evidence_root}/install.log"
            ./.venv/bin/python app/bootstrap/start_server.py --help 2>&1 | tee "${evidence_root}/start-help.txt"
            ./.venv/bin/python -c "import sys; sys.path.insert(0, 'app/server'); import backend.app.main; import fastapi, sqlalchemy, uvicorn" 2>&1 | tee "${evidence_root}/import-smoke.txt"
          )
          cp "${bundle_dir}/bundle-manifest.json" "${evidence_root}/"

      - name: Upload offline bundle smoke evidence
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: compatibility-offline-smoke-${{ matrix.asset_os }}-${{ matrix.archive }}-evidence
          path: ${{ runner.temp }}/invoice-assistant-compat-evidence
          if-no-files-found: warn

  compatibility-gate-result:
    name: Compatibility Gate Result
    runs-on: ubuntu-latest
    needs:
      - cross-platform-validation
      - windows-shell-smoke
      - offline-bundle-smoke
    if: always()

    steps:
      - name: Check compatibility gate inputs
        run: |
          echo "cross-platform-validation: ${{ needs.cross-platform-validation.result }}"
          echo "windows-shell-smoke: ${{ needs.windows-shell-smoke.result }}"
          echo "offline-bundle-smoke: ${{ needs.offline-bundle-smoke.result }}"

          if [ "${{ needs.cross-platform-validation.result }}" != "success" ]; then
            echo "cross-platform-validation did not succeed."
            exit 1
          fi

          if [ "${{ needs.windows-shell-smoke.result }}" != "success" ]; then
            echo "windows-shell-smoke did not succeed."
            exit 1
          fi

          if [ "${{ needs.offline-bundle-smoke.result }}" != "success" ]; then
            echo "offline-bundle-smoke did not succeed."
            exit 1
          fi

          echo "Compatibility gate inputs succeeded."
