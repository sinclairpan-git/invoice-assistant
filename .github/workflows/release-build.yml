name: Release Build

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag that will receive platform assets.
        required: true
        default: v0.5.2
      upload_to_release:
        description: Upload smoke-passed assets to the existing GitHub Release.
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: release-build-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  build-smoke-upload:
    name: ${{ matrix.asset_os }} ${{ matrix.archive }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - asset_os: windows
            runner: windows-latest
            archive: zip
          - asset_os: macos
            runner: macos-latest
            archive: tar.gz
          - asset_os: linux
            runner: ubuntu-latest
            archive: tar.gz

    env:
      RELEASE_TAG: ${{ inputs.tag }}
      GH_TOKEN: ${{ github.token }}
      PYTHONUTF8: "1"
      PYTHONIOENCODING: utf-8

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up pnpm
        uses: pnpm/action-setup@v5.0.0
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Compute POSIX platform suffix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          os="$(uname -s | tr '[:upper:]' '[:lower:]')"
          case "${os}" in
            darwin) os="macos" ;;
            linux) os="linux" ;;
          esac
          machine="$(uname -m | tr '[:upper:]' '[:lower:]')"
          case "${machine}" in
            x86_64|amd64) machine="amd64" ;;
            arm64|aarch64) machine="arm64" ;;
          esac
          echo "INVOICE_ASSISTANT_RELEASE_OS=${os}" >> "${GITHUB_ENV}"
          echo "INVOICE_ASSISTANT_RELEASE_MACHINE=${machine}" >> "${GITHUB_ENV}"

      - name: Compute Windows platform suffix
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $arch = [System.Runtime.InteropServices.RuntimeInformation]::OSArchitecture.ToString().ToLowerInvariant()
          if ($arch -eq "x64" -or $arch -eq "x86_64") {
            $arch = "amd64"
          } elseif ($arch -eq "aarch64") {
            $arch = "arm64"
          }
          "INVOICE_ASSISTANT_RELEASE_OS=windows" | Out-File -FilePath $env:GITHUB_ENV -Append
          "INVOICE_ASSISTANT_RELEASE_MACHINE=$arch" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install frontend dependencies
        run: pnpm --dir frontend install --frozen-lockfile

      - name: Build frontend
        run: pnpm --dir frontend build

      - name: Build backend runtime wheelhouse
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist-offline/wheels
          python - <<'PY'
          import tomllib
          from pathlib import Path
          deps = tomllib.loads(Path("backend/pyproject.toml").read_text(encoding="utf-8"))["project"]["dependencies"]
          Path("dist-offline/backend-runtime-requirements.txt").write_text("\n".join(deps) + "\n", encoding="utf-8")
          PY
          python -m pip install --upgrade pip
          python -m pip download --only-binary=:all: --dest dist-offline/wheels -r dist-offline/backend-runtime-requirements.txt

      - name: Build cloud release bundle
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          python scripts/build_cloud_release_bundle.py \
            --version "${RELEASE_TAG}" \
            --platform-os "${INVOICE_ASSISTANT_RELEASE_OS}" \
            --platform-machine "${INVOICE_ASSISTANT_RELEASE_MACHINE}" \
            --archive-format "${{ matrix.archive }}" \
            --wheels-dir dist-offline/wheels

      - name: Prepare bundled Windows Python runtime
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          python scripts/prepare_windows_portable_runtime.py --runtime-root ".tmp\windows-runtime\python-3.11.9"

      - name: Build Windows portable release bundle
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          python scripts/build_windows_portable.py `
            --version "${env:RELEASE_TAG}" `
            --dist-root dist-offline `
            --python-runtime-root ".tmp\windows-runtime\python-3.11.9" `
            --bundle-name "invoice-assistant-offline-${env:RELEASE_TAG}-windows-amd64"

      - name: Smoke Windows zip
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $asset = Get-ChildItem -Path "dist-offline" -Filter "invoice-assistant-offline-*.zip" -File | Select-Object -First 1
          if (-not $asset) { throw "Expected invoice-assistant-offline-*.zip was not produced." }
          $smokeRoot = Join-Path $env:RUNNER_TEMP "invoice-assistant-release-smoke"
          $evidenceRoot = Join-Path $env:RUNNER_TEMP "invoice-assistant-release-evidence"
          Remove-Item -Recurse -Force $smokeRoot, $evidenceRoot -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $smokeRoot, $evidenceRoot | Out-Null
          Expand-Archive -LiteralPath $asset.FullName -DestinationPath $smokeRoot -Force
          $bundleDir = Get-ChildItem -Path $smokeRoot -Directory | Select-Object -First 1
          if (-not $bundleDir) { throw "Expanded archive did not contain a bundle directory." }
          if (-not (Test-Path (Join-Path $bundleDir.FullName "manifest.json"))) { throw "Missing manifest.json" }
          if (-not (Test-Path (Join-Path $bundleDir.FullName "启动发票助手.bat"))) { throw "Missing 启动发票助手.bat" }
          if (-not (Test-Path (Join-Path $bundleDir.FullName "停止发票助手.bat"))) { throw "Missing 停止发票助手.bat" }
          if (-not (Test-Path (Join-Path $bundleDir.FullName "app\python\python.exe"))) { throw "Missing bundled Python runtime" }
          if (-not (Test-Path (Join-Path $bundleDir.FullName "app\bootstrap\launch_portable.py"))) { throw "Missing launch_portable.py" }
          Push-Location $bundleDir.FullName
          & .\app\python\python.exe app\bootstrap\launch_portable.py --portable-root $bundleDir.FullName --no-browser --timeout-seconds 45 *>&1 | Tee-Object -FilePath (Join-Path $evidenceRoot "launch.log")
          if ($LASTEXITCODE -ne 0) { throw "launch_portable.py failed with exit code $LASTEXITCODE" }
          & .\app\python\python.exe -c "import sys; sys.path.insert(0, 'app/server'); import backend.app.main; import fastapi, sqlalchemy, uvicorn" *>&1 | Tee-Object -FilePath (Join-Path $evidenceRoot "import-smoke.txt")
          if ($LASTEXITCODE -ne 0) { throw "runtime import smoke failed with exit code $LASTEXITCODE" }
          & .\app\python\python.exe app\bootstrap\stop_portable.py --portable-root $bundleDir.FullName *>&1 | Tee-Object -FilePath (Join-Path $evidenceRoot "stop.log")
          if ($LASTEXITCODE -ne 0) { throw "stop_portable.py failed with exit code $LASTEXITCODE" }
          Pop-Location
          Copy-Item -LiteralPath (Join-Path $bundleDir.FullName "manifest.json") -Destination $evidenceRoot
          Copy-Item -LiteralPath (Join-Path $bundleDir.FullName "logs\startup.log") -Destination $evidenceRoot -ErrorAction SilentlyContinue

      - name: Smoke POSIX tar
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          archive="$(find dist-offline -maxdepth 1 -name 'invoice-assistant-offline-*.tar.gz' -type f | head -n 1)"
          if [[ -z "${archive}" ]]; then
            echo "Expected invoice-assistant-offline-*.tar.gz was not produced." >&2
            exit 1
          fi
          smoke_root="${RUNNER_TEMP}/invoice-assistant-release-smoke"
          evidence_root="${RUNNER_TEMP}/invoice-assistant-release-evidence"
          rm -rf "${smoke_root}" "${evidence_root}"
          mkdir -p "${smoke_root}" "${evidence_root}"
          tar xzf "${archive}" -C "${smoke_root}"
          bundle_dir="$(find "${smoke_root}" -mindepth 1 -maxdepth 1 -type d | head -n 1)"
          test -n "${bundle_dir}"
          test -f "${bundle_dir}/bundle-manifest.json"
          test -x "${bundle_dir}/install_offline.sh"
          test -x "${bundle_dir}/start_invoice_assistant.command"
          (
            cd "${bundle_dir}"
            ./install_offline.sh 2>&1 | tee "${evidence_root}/install.log"
            ./.venv/bin/python app/bootstrap/start_server.py --help 2>&1 | tee "${evidence_root}/start-help.txt"
            ./.venv/bin/python -c "import sys; sys.path.insert(0, 'app/server'); import backend.app.main; import fastapi, sqlalchemy, uvicorn" 2>&1 | tee "${evidence_root}/import-smoke.txt"
          )
          cp "${bundle_dir}/bundle-manifest.json" "${evidence_root}/"

      - name: Upload build smoke evidence
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: release-build-${{ matrix.asset_os }}-${{ matrix.archive }}-evidence
          path: ${{ runner.temp }}/invoice-assistant-release-evidence
          if-no-files-found: warn

      - name: Upload platform asset artifact
        uses: actions/upload-artifact@v5
        with:
          name: invoice-assistant-${{ matrix.asset_os }}-${{ matrix.archive }}
          path: |
            dist-offline/invoice-assistant-offline-*.zip
            dist-offline/invoice-assistant-offline-*.tar.gz
          if-no-files-found: error

      - name: Upload smoke-passed asset to release
        if: inputs.upload_to_release == 'true'
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            asset="$(find dist-offline -maxdepth 1 -name 'invoice-assistant-offline-*.zip' -type f | head -n 1)"
          else
            asset="$(find dist-offline -maxdepth 1 -name 'invoice-assistant-offline-*.tar.gz' -type f | head -n 1)"
          fi
          if [[ -z "${asset}" ]]; then
            echo "No asset found for release upload." >&2
            exit 1
          fi
          gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null
          gh release upload "${RELEASE_TAG}" "${asset}" --clobber --repo "${GITHUB_REPOSITORY}"
