name: Cross Platform Core

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/cross-platform-core.yml"
      - "backend/**"
      - "frontend/**"
      - "packaging/**"
      - "scripts/**"
      - "pyproject.toml"
      - "uv.lock"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  core-smoke:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    concurrency:
      group: cross-platform-core-${{ github.event.pull_request.number || github.ref }}-${{ matrix.os }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up pnpm
        uses: pnpm/action-setup@v5.0.0
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Run backend portable and release smoke tests
        run: >-
          uv run pytest
          backend/tests/test_app_boot.py
          backend/tests/test_release_runtime.py
          backend/tests/test_portable_bootstrap.py
          backend/tests/test_cloud_release_bundle.py
          -q

      - name: Install frontend dependencies
        run: pnpm --dir frontend install --frozen-lockfile

      - name: Build frontend
        run: pnpm --dir frontend build
